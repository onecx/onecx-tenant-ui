<img
  [id]="id"
  [class]="'max-w-full ' + (styleClass ?? '')"
  [ocxSrc]="url"
  (error)="onImageLoadError()"
  (load)="onImageLoadSuccess()"
  [alt]="'LOGO.TOOLTIP' | translate"
  [attr.aria-label]="'LOGO.TOOLTIP' | translate"
  [pTooltip]="'LOGO.TOOLTIP' | translate"
  tooltipPosition="top"
  tooltipEvent="hover"
/>

<ocx-portal-page permission="TENANT#SEARCH" helpArticleId="PAGE_TENANT_SEARCH" *ngrxLet="viewModel$; let vm">
  <ocx-search-header
    [header]="'TENANT_SEARCH.HEADER' | translate"
    [subheader]="'TENANT_SEARCH.SUB_HEADER' | translate"
    (searched)="onSearch(tenantSearchForm)"
    (resetted)="onResetSearchCriteria()"
    [manualBreadcrumbs]="false"
    [actions]="(headerActions$ | async) ?? []"
    searchConfigPermission="SEARCHCONFIG#USE"
    [viewMode]="vm.viewMode"
    pageName="PAGE_TENANT_SEARCH"
    (viewModeChanged)="viewModeChanged($event)"
    (selectedSearchConfigChanged)="searchConfigInfoSelectionChanged($event)"
  >
    <div [formGroup]="tenantSearchForm" class="flex flex-row flex-wrap gap-3">
      <p-floatlabel>
        <input
          pInputText
          id="tm_search_orgId"
          type="text"
          class="w-15rem"
          formControlName="orgId"
          [attr.aria-label]="'TENANT_SEARCH.CRITERIA.ORGID' | translate"
          [pTooltip]="'TENANT_SEARCH.TOOLTIPS.ORGID' | translate"
          tooltipPosition="top"
          tooltipEvent="hover"
        />
        <label for="tm_search_orgId" class="text-responsive"> {{ 'TENANT_SEARCH.CRITERIA.ORGID' | translate }} </label>
      </p-floatlabel>
    </div>
  </ocx-search-header>

  <ocx-loading-indicator *ngIf="vm.loadingData"></ocx-loading-indicator>
  <ocx-content-container layout="horizontal" *ngIf="!vm.loadingData">
    <ocx-content class="w-full no-card-padding" *ngIf="(filteredResults$ | async) || [] as tenants">
      <ocx-interactive-data-view
        [actionColumnPosition]="'left'"
        [additionalActions]="additionalActions"
        [data]="tenants"
        [columns]="vm.columns"
        searchConfigPermission="SEARCHCONFIG#USE"
        [listGridPaginator]="true"
        [emptyResultsMessage]="'TENANT_SEARCH.EMPTY_RESULTS' | translate"
        [supportedViewLayouts]="['list', 'grid', 'table']"
        [layout]="layout"
        [displayedColumnKeys]="getDisplayedColumnKeys(vm.displayedColumns)"
        (displayedColumnKeysChange)="onDisplayedColumnKeysChange($event)"
        [defaultGroupKey]="'TENANT_SEARCH.PREDEFINED_GROUP.DEFAULT'"
        [pageSizes]="[10, 50, 200]"
        [sortField]="'tenantId'"
        [sortDirection]="ascendingSortDirection"
      >
        <ng-template #topCenter>
          <p-inputgroup class="w-auto tm-filter-group">
            <p-inputgroup-addon>
              <i class="pi pi-filter"></i>
            </p-inputgroup-addon>
            <p-floatlabel class="tm-filter-float" variant="on">
              <input
                #filterInput
                id="tm_search_filter"
                type="text"
                class="tm-filter-input"
                pInputText
                [value]="tenantFilterFormControl.value ?? ''"
                [tooltipPosition]="'bottom'"
                [pTooltip]="'TENANT_SEARCH.FILTER.TOOLTIP' | translate"
                tooltipEvent="hover"
                (input)="onGlobalFilter(filterInput.value)"
              />
              <label for="tm_search_filter" aria-hidden="true"> {{ 'TENANT_SEARCH.FILTER.LABEL' | translate }}</label>
            </p-floatlabel>
            <p-button
              id="tm_search_filter_clear"
              icon="pi pi-filter-slash"
              styleClass="tm-filter-clear"
              [disabled]="!tenantFilterFormControl.value"
              [ariaLabel]="'TENANT_SEARCH.FILTER.CLEAR' | translate"
              [pTooltip]="'TENANT_SEARCH.FILTER.CLEAR' | translate"
              tooltipPosition="top"
              tooltipEvent="hover"
              (click)="onClearGlobalFilter(filterInput)"
            />
          </p-inputgroup>
        </ng-template>

        <!-- LIST -->
        <section [attr.aria-label]="'TENANT_SEARCH.SECTIONS.RESULTS' | translate">
          <ng-template #listItem let-item let-i="index">
            <article
              [id]="'tm_search_data_list_row_' + i"
              class="w-full sm:mx-3 py-1 px-3 flex flex-row flex-nowrap justify-content-start align-items-center column-gap-3 border-1 border-transparent border-round-sm transition-colors transition-duration-150 hover:surface-100 hover:border-100 cursor-pointer list-item-row"
              [attr.aria-label]="item['orgId']"
              (click)="handleOpenEntryDetails(item)"
              (onkeypress)="handleOpenEntryDetails(item)"
              (keydown.enter)="handleOpenEntryDetails(item)"
            >
              <div
                class="p-0 h-3rem sm:h-4rem col-4 sm:col-3 md:col-2 flex justify-content-around align-items-center"
                aria-hidden="true"
              >
                <app-image-container
                  [id]="'tm_search_data_list_row_' + i + '_logo'"
                  styleClass="max-h-3rem max-w-4rem sm:max-w-6rem border-round-sm"
                  [bffUrl]="getImageUrl(item['id'])"
                ></app-image-container>
              </div>
              <div
                [id]="'tm_search_data_list_row_' + i + '_org_id'"
                class="p-0 col-8 sm:col-6 md:col-6 lg:col-5 xl:col-3 sm:font-bold text-base sm:text-md md:text-lg text-overflow-ellipsis overflow-hidden white-space-nowrap"
                [attr.aria-label]="'TENANT_SEARCH.LIST_ITEM.TOOLTIPS.ORG_ID' | translate"
                [pTooltip]="'TENANT_SEARCH.LIST_ITEM.TOOLTIPS.ORG_ID' | translate"
                tooltipPosition="top"
                tooltipEvent="hover"
                role="note"
              >
                {{ item['orgId'] }}
              </div>
              <div
                [id]="'tm_search_data_list_row_' + i + '_tenant_id'"
                class="p-0 hidden sm:block col-3 md:col-2 text-overflow-ellipsis overflow-hidden white-space-nowrap"
                [attr.aria-label]="'TENANT_SEARCH.LIST_ITEM.TOOLTIPS.TENANT_ID' | translate"
                [pTooltip]="'TENANT_SEARCH.LIST_ITEM.TOOLTIPS.TENANT_ID' | translate"
                tooltipPosition="top"
                tooltipEvent="hover"
                role="note"
              >
                {{ item['tenantId'] }}
              </div>
              <div
                class="p-0 hidden xl:block col-2 text-overflow-ellipsis overflow-hidden white-space-nowrap"
                [id]="'tm_search_data_list_row_' + item['id'] + '_description'"
                [attr.aria-label]="'TENANT_SEARCH.COLUMNS.DESCRIPTION' | translate"
                [pTooltip]="'TENANT_SEARCH.LIST_ITEM.TOOLTIPS.DESCRIPTION' | translate"
                tooltipPosition="top"
                tooltipEvent="hover"
                role="note"
              >
                {{ item['description'] }}
              </div>
            </article>
          </ng-template>
        </section>

        <!-- GRID -->
        <ng-template #gridItem let-item let-i="index">
          <div class="col-6 md:col-4 xl:col-3 p-2 md:p-3">
            <p-card
              styleClass="p-2 flex flex-column gap-1 sm:gap-2 justify-content-between text-center border-1 border-transparent transition-colors transition-duration-150 hover:surface-100 hover:border-100 cursor-pointer"
              (click)="handleOpenEntryDetails(item)"
              (onkeypress)="handleOpenEntryDetails(item)"
              (keydown.enter)="handleOpenEntryDetails(item)"
              [attr.aria-label]="'OrgId: ' + item['orgId'] + ', TenantId: ' + item['tenantId']"
            >
              <div
                class="font-bold sm:text-lg md:text-xl lg:text-2xl text-responsive"
                [attr.aria-label]="'TENANT_SEARCH.COLUMNS.ORG_ID' | translate"
                [pTooltip]="'TENANT_SEARCH.COLUMNS.ORG_ID' | translate"
                tooltipPosition="top"
                tooltipEvent="hover"
                role="note"
              >
                {{ item['orgId'] }}
              </div>
              <div
                class="text-sm md:text-base text-responsive"
                [attr.aria-label]="'TENANT_SEARCH.COLUMNS.TENANT_ID' | translate"
                [pTooltip]="'TENANT_SEARCH.COLUMNS.TENANT_ID' | translate"
                tooltipPosition="top"
                tooltipEvent="hover"
                role="note"
              >
                {{ item['tenantId'] }}
              </div>
              <div
                class="mt-1 h-4rem sm:h-6rem md:h-8rem px-4 flex justify-content-center align-items-center border-round-sm"
                aria-hidden="true"
              >
                <app-image-container
                  [id]="'tm_search_data_grid_row_' + i + '_logo'"
                  styleClass="max-h-4rem sm:max-h-6rem md:max-h-8rem border-round-sm"
                  [bffUrl]="getImageUrl(item['id'])"
                ></app-image-container>
              </div>
            </p-card>
          </div>
        </ng-template>
      </ocx-interactive-data-view>
    </ocx-content>

    <ocx-content class="w-full xl:w-3" *ngIf="vm.results.length > 0 && vm.chartVisible && (diagramColumn$ | async)">
      <div class="flex flex-column md:flex-row lg:flex-column justify-content-center">
        <ocx-group-by-count-diagram
          *ngIf="diagramColumn$ | async as diagramColumn"
          [data]="vm.results"
          [column]="diagramColumn"
          sumKey="TENANT_SEARCH.DIAGRAM.SUM"
        ></ocx-group-by-count-diagram>
      </div>
    </ocx-content>
  </ocx-content-container>
</ocx-portal-page>
